<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VitalEdge E-commerce - Glass Gallery UI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn1H6li6kRY9lxfw4fGqQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* ---------- Theme tokens ---------- */
        :root{
            --accent: #2dd4bf; /* teal */
            --accent-dark: #14b8a6;
            --curator-dark: #071018; /* Nearly black background */
            --glass-border: rgba(255,255,255,0.12);
        }

        /* ---------- Page background (Dark body/background for glass effect) ---------- */
        body{
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: radial-gradient(1200px 600px at 10% 10%, rgba(45,212,191,0.04), transparent 10%),
                        radial-gradient(900px 500px at 90% 90%, rgba(16,185,129,0.03), transparent 12%),
                        linear-gradient(180deg,#071018 0%, #06101b 100%);
            min-height:100vh;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            color: #0f172a; /* Default for light content */
            padding-bottom: 4rem;
        }

        /* ---------- Fixed Sidebar Styles ---------- */
        .user-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px; /* Fixed width for clarity */
            z-index: 40;
            padding-top: 92px; /* Clearance for header */
            transform: translateX(-100%);
            transition: transform 0.3s ease-out;
            
            /* Glassy Dark Style */
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px) saturate(140%);
            -webkit-backdrop-filter: blur(15px) saturate(140%);
            border-right: 1px solid rgba(45, 212, 191, 0.2);
            color: #e6eef0;
            overflow-y: auto;
        }
        .user-sidebar.open {
            transform: translateX(0);
        }
        .sidebar-item {
            padding: 12px 18px;
            font-size: 1.05rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .sidebar-item:hover {
            background: rgba(45, 212, 191, 0.1);
        }
        .sidebar-item.active {
            background: rgba(45, 212, 191, 0.2);
            color: var(--accent);
        }

        /* ---------- Header and Main adjustments for layout shift ---------- */
        header.site-header {
            position: fixed;
            inset: 0 0 auto 0;
            z-index: 50;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
            box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
            padding: 0.7rem 1rem;
        }

        main.app-shell{
            max-width: 1200px;
            margin: 92px auto 48px;
            padding: 32px;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(250,250,250,0.95));
            box-shadow:
                0 10px 30px rgba(12, 20, 30, 0.08),
                inset 0 1px 0 rgba(255,255,255,0.6);
            border: 1px solid rgba(15, 23, 42, 0.04);
            backdrop-filter: blur(8px);
        }

        /* Rest of the styles remain for card presentation, modals, etc. */
        .section-title{ color: #0f172a; }
        .section-sub{ color: #475569; }
        .glass-card{
            background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.65));
            border-radius: 14px;
            border: 1px solid rgba(15,23,42,0.06);
            box-shadow: 0 6px 20px rgba(12,20,30,0.06);
            overflow: hidden;
            transition: transform .28s cubic-bezier(.2,.9,.2,1), box-shadow .28s, border-color .28s;
            display:flex;
            flex-direction:column;
        }
        .glass-card:hover{
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 18px 40px rgba(16,24,40,0.14);
            border-color: rgba(45,212,191,0.16);
        }
        .glass-card .img-wrap{ height:170px; overflow:hidden; background: linear-gradient(180deg,#e6fdf9, #eafbf7 60%); display:flex; align-items:center; justify-content:center; }
        .glass-card img{ width:100%; height:100%; object-fit:cover; display:block; transition: transform .5s ease; }
        .glass-card:hover img{ transform: scale(1.04); }
        .glass-card .card-body{ padding: 14px; display:flex; flex-direction:column; gap:8px; min-height:140px; }
        .price-badge{ background: linear-gradient(90deg,var(--accent) 0%, var(--accent-dark) 100%); color: #042022; padding: 6px 10px; border-radius:999px; font-weight:700; font-size:1rem; box-shadow: 0 6px 18px rgba(45,212,191,0.12); }
        .small-muted{ color:#6b7280; font-size:0.92rem; }
        .hero{ display:flex; align-items:center; justify-content:space-between; gap: 1rem; margin-bottom: 1.4rem; }
        .hero-left{ max-width: 64%; }
        .search-box{ display:flex; gap: 0.5rem; align-items:center; margin: 18px 0; }
        .search-field{ flex:1; border-radius: 12px; padding: 12px 14px; border: 1px solid rgba(15,23,42,0.06); background: rgba(255,255,255,0.9); display:flex; gap:8px; align-items:center; box-shadow: inset 0 1px 0 rgba(255,255,255,0.6); transition: box-shadow .18s, border-color .18s, transform .12s; }
        .search-field:focus-within{ box-shadow: 0 6px 20px rgba(45,212,191,0.06); border-color: rgba(45,212,191,0.2); transform: translateY(-1px); }
        .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top: 12px }
        .chip { padding: 8px 12px; border-radius: 999px; background: rgba(2,6,23,0.04); border:1px solid rgba(15,23,42,0.04); color: #0f172a; font-weight:600; font-size:0.95rem; cursor:pointer; transition: all .18s; }
        .chip:hover{ transform: translateY(-4px); box-shadow: 0 8px 18px rgba(2,6,23,0.06) }
        .chip.active{ background: linear-gradient(90deg,var(--accent), var(--accent-dark)); color:#052423; box-shadow: 0 8px 30px rgba(45,212,191,0.12); }
        .brand { display:flex; gap:8px; align-items:center; font-weight:800; color:#042022; letter-spacing: -0.02em; font-size:1.25rem; }
        .upload-btn{ background: linear-gradient(90deg,var(--accent), var(--accent-dark)); color:#042022; padding: 10px 14px; border-radius: 12px; font-weight:700; display:inline-flex; gap:8px; align-items:center; box-shadow: 0 12px 30px rgba(45,212,191,0.12); transition: transform .12s, box-shadow .12s; }
        .upload-btn:hover{ transform: translateY(-3px) ; box-shadow: 0 20px 50px rgba(14,40,40,0.12) }
        .header-action-btn { padding: 8px 12px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; transition: all 0.15s; }
        #auth-btn { background-color: var(--accent); color: #042022; box-shadow: 0 4px 12px rgba(45,212,191,0.25); }
        #auth-btn:hover { background-color: var(--accent-dark); }
        #cart-btn { background-color: #f1f5f9; color: #042022; border: 1px solid rgba(15, 23, 42, 0.1); }
        footer.site-footer{ max-width:1200px; margin: 0 auto; color:#94a3b8; text-align:center; padding:16px; }
        .modal-backdrop{ position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center; background:rgba(2,6,23,0.6); backdrop-filter: blur(8px) saturate(140%); -webkit-backdrop-filter: blur(8px) saturate(140%); }
        .modal{ width:100%; max-width:700px; background: linear-gradient(180deg, rgba(10,14,18,0.88), rgba(8,10,12,0.84)); border-radius: 14px; border: 1px solid rgba(255,255,255,0.04); box-shadow: 0 30px 80px rgba(2,6,23,0.7); padding: 20px; color: #e6eef0; transform: translateY(10px); transition: transform .18s ease, opacity .18s; }
        .modal.show{ display:flex; }
        .modal .modal-head{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
        .modal .input, .modal select, .modal textarea{ width:100%; border-radius: 10px; padding:10px 12px; background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); color: #e6eef0; outline:none; transition: box-shadow .12s, border-color .12s; }
        .modal .input:focus, .modal select:focus, .modal textarea:focus{ border-color: rgba(45,212,191,0.18); box-shadow: 0 8px 30px rgba(45,212,191,0.06); }
        .modal .btn{ padding:10px 12px; border-radius:10px; font-weight:700; cursor:pointer; border: none; }
        .modal .btn.primary{ background: linear-gradient(90deg,var(--accent), var(--accent-dark)); color:#042022; box-shadow:0 12px 30px rgba(45,212,191,0.12); }
        .modal .btn.ghost{ background:transparent; color:#cbd5e1; border:1px solid rgba(255,255,255,0.04); }
        .modal #auth-toggle-btn { background-color: transparent; border: none; color: var(--accent); text-decoration: underline; }
        .modal select option { color: #0d1117; background: #e6eef0; }

        

    /* existing styles */

    .category-dropdown {
        display: none;
    }

    .category-menu:hover .category-dropdown {
        display: block;
    }

    .category-dropdown .chip:hover {
        background: rgba(45,212,191,0.15);
    }






    </style>

</head>

</div>



<button class="chip" onclick="setView('trending')">Trending</button>

<input id="product-price" name="product-price" type="number" step="0.01" class="input" required />

    <script>
        /* ---------- JS state & logic (adapted from your original file) ---------- */

        // App state
        let currentView = 'home';
        let currentFilter = 'date-desc';
        let currentSearchTerm = '';
        let currentCategoryFilter = '';
        let isLoggedIn = false;
        let currentUser = { id: 'guest', username: 'Guest' };
        let cartItems = {}; cartItems[currentUser.id] = [];

        // Sidebar state
        let sidebarOpen = false;

        const initialCategories = {
            'Electronics': 0, 'Apparel': 0, 'Home Goods': 0, 'Books': 0,
            'Sports': 0, 'Furniture': 0, 'Miscellaneous': 0,
        };
        let userPreferences = { ...initialCategories };

       let products = [];


            /* Initialize preferences */
            const initializeUserPreferences = () => {
                products.forEach(p => {
                    if (userPreferences.hasOwnProperty(p.category)) userPreferences[p.category] += 1;
                });
            };

            const getPreferredCategory = () => {
                let best=null, max=-1;
                for (const k in userPreferences) if (userPreferences[k]>max){max=userPreferences[k]; best=k;}
                return max>0?best:null;
            };
            
            

            
            
            // New Function: Profile Settings Simulation
            const handleProfileSettings = () => {
                showStatusMessage('Accessing Profile Settings... (Simulation successful)');
                // In a real application, this would open a new modal or navigate to a profile editing page.
            };


            /* Helpers: icons & logos */
            const getIconSvg = (name, size=18) => {
                const icons = {
                    'Search': `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
                    'Shield': `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
                };
                return icons[name]||'';
            };
            const getSourceLogoSvg = (s, size=14) => {
                const map = {
                    'Amazon': `<i class="fa-brands fa-amazon" style="font-size:${size}px;color:#b77c1f"></i>`,
                    'Flipkart': `<i class="fas fa-shopping-bag" style="font-size:${size}px;color:#2b6cb0"></i>`,
                    'Meesho': `<i class="fa-solid fa-shirt" style="font-size:${size}px;color:#f472b6"></i>`,
                    'Myntra': `<i class="fas fa-star" style="font-size:${size}px;color:#ef4444"></i>`
                };
                return map[s]||`<i class="fas fa-link" style="font-size:${size}px;color:#94a3b8"></i>`;
            };

            /* Small UI helpers */
            const showStatusMessage = (text, isError=false) => {
                const existing = document.querySelector('.status-message'); if(existing) existing.remove();
                const el = document.createElement('div');
                el.className = 'status-message fixed right-6 bottom-6 p-3 rounded-lg text-sm font-semibold';
                el.style.zIndex = 120;
                el.style.background = isError ? 'linear-gradient(90deg,#ef4444,#dc2626)' : 'linear-gradient(90deg,var(--accent),var(--accent-dark))';
                el.style.color = isError ? '#fff' : '#042022';
                el.textContent = text;
                document.body.appendChild(el);
                setTimeout(()=>el.remove(),3800);
            };

            const showLoginRequired = () => {
    showStatusMessage("Please login to continue", true);
    showAuthModal('login');
};

            /* Modal control */
            const getUploadModal = ()=>document.getElementById('upload-modal');
    const showUploadModal = () => {

           if (!isLoggedIn) {
           showStatusMessage("Please login to upload products", true);
           showAuthModal('login');
           return;
      }

        <h1 class="section-title">🔥 Trending Products</h1>
        <p class="section-sub">Most popular curated items</p>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:16px">
            ${cards}
        </div>
    </section>
    `;
};

const renderProfilePage = () => {

    if(!isLoggedIn){
        return `
        <section>
            <h1 class="section-title">Profile</h1>
            <p class="section-sub">Please login to view your profile</p>
        </section>
        `;
    }

    return `
    <section>
        <h1 class="section-title">My Profile</h1>

        <div class="glass-card" style="max-width:500px;padding:20px">

            <p><strong>Username:</strong> ${currentUser.username}</p>
            <p><strong>User ID:</strong> ${currentUser.id}</p>
            <p><strong>City:</strong> ${currentUser.city || "Not specified"}</p>

            <div style="margin-top:20px">
                <button class="chip" onclick="setView('mysubmissions')">My Products</button>
                <button class="chip" onclick="setView('cart')">My Cart</button>
                <button class="chip" onclick="handleLogout()">Logout</button>
            </div>

        </div>
    </section>
    `;
};

function toggleCategoryMenu() {

    const menu = document.getElementById("category-dropdown");

    if(menu.classList.contains("hidden")){
        menu.classList.remove("hidden");
    } else {
        menu.classList.add("hidden");
    }

}

function selectCategory(category){

    document.getElementById("category-dropdown").classList.add("hidden");

    filterByCategory(category);

}
document.addEventListener("click", function(event){

    const menu = document.getElementById("category-dropdown");

    if(!event.target.closest(".relative")){
        menu.classList.add("hidden");
    }

});

const updateProductGrid = () => {

    const productsToFilter = currentCategoryFilter
        ? products.filter(p => p.category === currentCategoryFilter)
        : products;

    const filtered = applyFilteringAndSearching(productsToFilter);

    const grid = document.querySelector("#product-grid");

    if(!grid) return;

    grid.innerHTML = filtered.length
        ? filtered.map((p,i)=>createProductCard(p,i)).join('')
        : getEmptyStateHtml('No items found');

};
    
let deleteProductId = null;

const openDeleteModal = (id) => {
    deleteProductId = id;

    const modal = document.getElementById("delete-modal");
    modal.classList.add("show");
    modal.style.display = "flex";
};

const closeDeleteModal = (e) => {
    if (!e || e.target.id === "delete-modal") {
        const modal = document.getElementById("delete-modal");
        modal.classList.remove("show");
        modal.style.display = "none";
    }
};

const confirmDelete = () => {

    fetch(`/api/delete-product/${deleteProductId}?user_id=${currentUser.id}`, {
        method: 'DELETE'
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            showStatusMessage("Product deleted");
            fetchProducts();
        }

        closeDeleteModal();
    });

};



        </script>
</body>
</html>
